workflows:
  ionic-ios-build:
    name: Ionic iOS Build
    max_build_duration: 60

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Ionic app
        script: |
          npm run build

      - name: Install Capacitor iOS
        script: |
          npm install @capacitor/ios

      - name: Clean iOS folder
        script: |
          rm -rf ios

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy web assets
        script: |
          npx cap copy ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -derivedDataPath build

    artifacts:
      - ios/App/build/**