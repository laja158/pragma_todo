workflows:
  ionic-ios-build:
    name: Ionic iOS Build
    max_build_duration: 60

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Ionic app
        script: |
          npm run build

      - name: Install Capacitor iOS
        script: |
          npm install @capacitor/ios

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

    artifacts:
      - ios/**