<ion-header>
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-item>
    <ion-input
      [(ngModel)]="newCategoryName"
      placeholder="Nueva categoría">
    </ion-input>

    <ion-button (click)="addCategory()">
      Agregar
    </ion-button>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let cat of categories$ | async">
      <ion-label>{{ cat.name }}</ion-label>

      <ion-button
        color="danger"
        fill="clear"
        (click)="delete(cat.id)">
        Eliminar
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
