<ion-header>
  <ion-toolbar>
    <ion-title>Tareas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-item>
  <ion-input
    [(ngModel)]="newTaskTitle"
    placeholder="Nueva tarea">
  </ion-input>

  <ion-select
    [(ngModel)]="selectedCategory"
    placeholder="Categoría">

    <ion-select-option
      *ngFor="let cat of categories$ | async"
      [value]="cat.id">

      {{ cat.name }}

    </ion-select-option>

  </ion-select>

  <ion-button (click)="addTask()">
    Agregar
  </ion-button>
</ion-item>

  <ion-item>
    <ion-select
      placeholder="Filtrar por categoría"
      (ionChange)="filterByCategory($event.detail.value)">

      <ion-select-option value="">
        Todas
      </ion-select-option>

      <ion-select-option
        *ngFor="let cat of categories$ | async"
        [value]="cat.id">

        {{ cat.name }}

      </ion-select-option>

    </ion-select>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let task of vm$ | async; trackBy: trackById">
      <ion-checkbox slot="start" (ionChange)="toggle(task.id)" [checked]="task.completed"></ion-checkbox>

      <ion-label [class.completed]="task.completed">
        {{ task.title }}
        <p *ngIf="task.categoryName">
          {{ task.categoryName }}
        </p>
      </ion-label>

      <ion-button color="danger" fill="clear" (click)="delete(task.id)">
        Eliminar
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
